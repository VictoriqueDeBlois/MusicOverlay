<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Artist Overlay</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --artist-font:   "Microsoft YaHei", sans-serif;
    --artist-size:   18px;
    --artist-color:  #aaaaaa;
    --artist-shadow: 0 2px 8px rgba(0,0,0,0.8);
    --artist-weight: normal;
    --bg:            transparent;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    overflow: hidden;
    display: flex;
    align-items: center;
  }

  .artist-wrap {
    overflow: hidden;
    white-space: nowrap;
    width: 100%;
    padding: 4px 8px;
  }

  #artist-text {
    font-family: var(--artist-font);
    font-size:   var(--artist-size);
    color:       var(--artist-color);
    text-shadow: var(--artist-shadow);
    font-weight: var(--artist-weight);
    display: inline-block;
  }

  @keyframes marquee {
    0%,20%  { transform: translateX(0); }
    80%,100% { transform: translateX(var(--marquee-offset, -50%)); }
  }
  .marquee { animation: marquee 8s ease-in-out infinite; }
</style>
<link rel="stylesheet" href="/custom/user.css" onerror="this.remove()">
<script src="/overlay.js"></script>
</head>
<body>
<div class="artist-wrap">
  <span id="artist-text"></span>
</div>

<script>
  const artistText = document.getElementById('artist-text');

  initOverlay({
    onMedia(data) {
      applyTheme(data.theme);
      artistText.textContent = data.artist || '';
      requestAnimationFrame(() => {
        setupMarquee(artistText);
        const offset = artistText.scrollWidth - artistText.parentElement.clientWidth;
        artistText.style.setProperty('--marquee-offset', `-${offset}px`);
      });
    }
  });
</script>
</body>
</html>
