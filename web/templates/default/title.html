<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Title Overlay</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --title-font:    "Microsoft YaHei", sans-serif;
    --title-size:    28px;
    --title-color:   #ffffff;
    --title-shadow:  0 2px 8px rgba(0,0,0,0.8);
    --title-weight:  normal;
    --bg:            transparent;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    overflow: hidden;
    display: flex;
    align-items: center;
  }

  .title-wrap {
    overflow: hidden;
    white-space: nowrap;
    width: 100%;
    padding: 4px 8px;
  }

  #title-text {
    font-family: var(--title-font);
    font-size:   var(--title-size);
    color:       var(--title-color);
    text-shadow: var(--title-shadow);
    font-weight: var(--title-weight);
    display: inline-block;
  }

  @keyframes marquee {
    0%,20%  { transform: translateX(0); }
    80%,100% { transform: translateX(var(--marquee-offset, -50%)); }
  }
  .marquee { animation: marquee 8s ease-in-out infinite; }
</style>
<link rel="stylesheet" href="/custom/user.css" onerror="this.remove()">
<script src="/overlay.js"></script>
</head>
<body>
<div class="title-wrap">
  <span id="title-text">等待音乐...</span>
</div>

<script>
  const titleText = document.getElementById('title-text');

  initOverlay({
    onMedia(data) {
      applyTheme(data.theme);
      titleText.textContent = data.title || '';
      requestAnimationFrame(() => {
        setupMarquee(titleText);
        const offset = titleText.scrollWidth - titleText.parentElement.clientWidth;
        titleText.style.setProperty('--marquee-offset', `-${offset}px`);
      });
    }
  });
</script>
</body>
</html>
