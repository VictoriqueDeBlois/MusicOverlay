<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Cover Overlay</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cover-size:    200px;
    --cover-shape:   50%;
    --rotate-speed:  8s;
    --cover-anim:    spin var(--rotate-speed) linear infinite;
    --bg:            transparent;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .cover-wrap {
    width: var(--cover-size);
    height: var(--cover-size);
    position: relative;
  }

  #cover-img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: var(--cover-shape);
    animation: var(--cover-anim);
    animation-play-state: paused;
    background: #333;
    display: block;
  }

  /* vinyl ring */
  .vinyl-ring::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: 50%;
    background: radial-gradient(
      circle at center,
      #111 0%, #111 22%,
      transparent 22%, transparent 35%,
      #222 35%, #222 37%,
      transparent 37%, transparent 100%
    );
    z-index: 1;
    pointer-events: none;
  }

  @keyframes spin  { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.04); } }
</style>
<link rel="stylesheet" href="/custom/user.css" onerror="this.remove()">
<script src="/overlay.js"></script>
</head>
<body>
<div class="cover-wrap" id="cover-wrap">
  <img id="cover-img" src="" alt="cover">
</div>

<script>
  const coverWrap = document.getElementById('cover-wrap');
  const coverImg  = document.getElementById('cover-img');

  initOverlay({
    onMedia(data) {
      applyTheme(data.theme);

      if (data.cover) {
        coverImg.src = data.cover;
        coverImg.style.opacity = '1';
      } else {
        coverImg.src = '';
        coverImg.style.opacity = '0';
      }

      const isRotate = data.theme?.cover?.animation === 'rotate';
      coverWrap.classList.toggle('vinyl-ring', isRotate);

      setPlayState(data.isPlaying);
    }
  });
</script>
</body>
</html>
