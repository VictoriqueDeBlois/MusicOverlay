<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Music Overlay</title>
<style>
  /* ── Reset & base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cover-size:    200px;
    --cover-shape:   50%;
    --rotate-speed:  8s;
    --cover-anim:    spin var(--rotate-speed) linear infinite;
    --title-font:    "Microsoft YaHei", sans-serif;
    --title-size:    28px;
    --title-color:   #ffffff;
    --title-shadow:  0 2px 8px rgba(0,0,0,0.8);
    --title-weight:  normal;
    --artist-font:   "Microsoft YaHei", sans-serif;
    --artist-size:   18px;
    --artist-color:  #aaaaaa;
    --artist-shadow: 0 2px 8px rgba(0,0,0,0.8);
    --artist-weight: normal;
    --album-font:    "Microsoft YaHei", sans-serif;
    --album-size:    16px;
    --album-color:   #aaaaaa;
    --album-shadow:  0 2px 8px rgba(0,0,0,0.8);
    --album-weight:  normal;
    --bg:            transparent;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    overflow: hidden;
  }

  .overlay {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 16px;
    height: 100%;
  }

  /* ── Cover ── */
  .cover-wrap {
    flex-shrink: 0;
    width: var(--cover-size);
    height: var(--cover-size);
    position: relative;
  }

  #cover-img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: var(--cover-shape);
    animation: var(--cover-anim);
    animation-play-state: paused;
    background: #333;
    display: block;
  }

  /* placeholder when no cover */
  .cover-wrap::after {
    content: '♪';
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: calc(var(--cover-size) * 0.4);
    color: #555;
    pointer-events: none;
    opacity: 0;
    transition: opacity .3s;
  }
  .cover-wrap.no-cover #cover-img { opacity: 0; }
  .cover-wrap.no-cover::after { opacity: 1; }

  /* vinyl record ring */
  .cover-wrap.vinyl-style::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: 50%;
    background: radial-gradient(
      circle at center,
      #111 0%, #111 22%,
      transparent 22%, transparent 35%,
      #222 35%, #222 37%,
      transparent 37%, transparent 100%
    );
    z-index: 1;
    pointer-events: none;
  }

  /* ── Text block ── */
  .text-block {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .title-wrap, .artist-wrap, .album-wrap {
    overflow: hidden;
    white-space: nowrap;
  }

  #title-text {
    font-family: var(--title-font);
    font-size:   var(--title-size);
    color:       var(--title-color);
    text-shadow: var(--title-shadow);
    font-weight: var(--title-weight);
    display: inline-block;
  }

  #artist-text {
    font-family: var(--artist-font);
    font-size:   var(--artist-size);
    color:       var(--artist-color);
    text-shadow: var(--artist-shadow);
    font-weight: var(--artist-weight);
    display: inline-block;
  }

  #album-text {
    font-family: var(--album-font);
    font-size:   var(--album-size);
    color:       var(--album-color);
    text-shadow: var(--album-shadow);
    font-weight: var(--album-weight);
    display: inline-block;
  }

  /* ── Marquee ── */
  @keyframes marquee {
    0%   { transform: translateX(0); }
    20%  { transform: translateX(0); }
    80%  { transform: translateX(var(--marquee-offset, -50%)); }
    100% { transform: translateX(var(--marquee-offset, -50%)); }
  }
  .marquee {
    animation: marquee 8s ease-in-out infinite;
  }

  /* ── Spin & pulse ── */
  @keyframes spin  { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.04); } }

  /* ── Preset: vinyl ── */
  body.preset-vinyl .cover-wrap { filter: drop-shadow(0 4px 16px rgba(0,0,0,.6)); }
  body.preset-vinyl .cover-wrap #cover-img { border: 3px solid #1a1a1a; }

  /* ── Preset: minimal ── */
  body.preset-minimal .cover-wrap #cover-img { border-radius: 8px; animation: none !important; }
  body.preset-minimal .text-block { gap: 4px; }

  /* ── Preset: card ── */
  body.preset-card .overlay {
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(12px);
    border-radius: 16px;
  }
  body.preset-card .cover-wrap #cover-img { border-radius: 10px; animation: none !important; }

  /* ── Custom user CSS (loaded last so it overrides everything) ── */
</style>
<!-- user custom CSS override -->
<link rel="stylesheet" href="/custom/user.css" onerror="this.remove()">
<script src="/overlay.js"></script>
</head>
<body>
<div class="overlay">
  <div class="cover-wrap" id="cover-wrap">
    <img id="cover-img" src="" alt="cover">
  </div>
    <div class="text-block">
      <div class="title-wrap"><span id="title-text">等待音乐...</span></div>
      <div class="artist-wrap"><span id="artist-text"></span></div>
      <div class="album-wrap"><span id="album-text"></span></div>
    </div>
</div>

<script>
  const coverWrap  = document.getElementById('cover-wrap');
  const coverImg   = document.getElementById('cover-img');
  const titleText  = document.getElementById('title-text');
  const artistText = document.getElementById('artist-text');
  const albumText  = document.getElementById('album-text');

  initOverlay({
    onMedia(data) {
      applyTheme(data.theme);

      // cover
      if (data.cover) {
        coverImg.src = data.cover;
        coverWrap.classList.remove('no-cover');
      } else {
        coverImg.src = '';
        coverWrap.classList.add('no-cover');
      }

      // vinyl ring
      if (data.theme?.cover?.animation === 'rotate') {
        coverWrap.classList.add('vinyl-style');
      }

      // preset class on body
      document.body.className = `preset-${data.theme?.preset || 'vinyl'}`;

      titleText.textContent  = data.title  || '';
      artistText.textContent = data.artist || '';
      albumText.textContent  = data.album  || '';

      setPlayState(data.isPlaying);
      requestAnimationFrame(() => {
        setupMarquee(titleText);
        setupMarquee(artistText);
        setupMarquee(albumText);
        // compute marquee offset based on actual text vs container width
        const tw = titleText.scrollWidth - titleText.parentElement.clientWidth;
        titleText.style.setProperty('--marquee-offset', `-${tw}px`);
        const aw = artistText.scrollWidth - artistText.parentElement.clientWidth;
        artistText.style.setProperty('--marquee-offset', `-${aw}px`);
        const albw = albumText.scrollWidth - albumText.parentElement.clientWidth;
        albumText.style.setProperty('--marquee-offset', `-${albw}px`);
      });
    }
  });
</script>
</body>
</html>
