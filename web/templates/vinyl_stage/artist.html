<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vinyl Artist</title>
  <link rel="stylesheet" href="/custom/user.css" onerror="this.remove()">
  <script src="/overlay.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: transparent; overflow: hidden; }
    .wrap { height: 100%; display: flex; align-items: center; justify-content: center; padding: 16px 24px; }
    .line { overflow: hidden; white-space: nowrap; max-width: 100%; }
    #artist-text {
      font-family: "Bahnschrift", sans-serif;
      font-size: 28px;
      color: #d8c9aa;
      text-shadow: 0 2px 10px rgba(0,0,0,0.6);
      font-weight: normal;
      letter-spacing: 0.5px;
      display: inline-block;
    }
    @keyframes marquee {
      0% { transform: translateX(0); }
      20% { transform: translateX(0); }
      80% { transform: translateX(var(--marquee-offset, -50%)); }
      100% { transform: translateX(var(--marquee-offset, -50%)); }
    }
    .marquee { animation: marquee 8s ease-in-out infinite alternate; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="line"><span id="artist-text">等待音乐...</span></div>
  </div>
  <script>
    const artistText = document.getElementById('artist-text');

    function updateMarquee() {
      if (!artistText) return;
      const parent = artistText.parentElement;
      if (!parent) return;
      const overflow = artistText.scrollWidth - parent.clientWidth;
      if (overflow > 4) {
        artistText.classList.add('marquee');
        artistText.style.setProperty('--marquee-offset', `-${overflow}px`);
      } else {
        artistText.classList.remove('marquee');
        artistText.style.setProperty('--marquee-offset', '0px');
      }
    }

    initOverlay({
      onMedia(data) {
        artistText.textContent = data.artist || '';
        requestAnimationFrame(updateMarquee);
      }
    });

    window.addEventListener('resize', updateMarquee);
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) requestAnimationFrame(updateMarquee);
    });
    setInterval(updateMarquee, 1000);
  </script>
</body>
</html>
